            hard: [{ q: "High BP medical term?", opts: ["Hypertension","Hypotension","Hyperglycemia","Hyperlipidemia"], correct:0 },{ q: "COVID-19 causing virus?", opts: ["SARS-CoV-2","MERS-CoV","H1N1","Ebola"], correct:0 },{ q: "Insulin produced by?", opts: ["Beta cells","Alpha cells","Delta cells","Gamma cells"], correct:0 },{ q: "CBC full form?", opts: ["Complete Blood Count","Comprehensive Body Check","Cardiac Blood","Cerebral Blood"], correct:0 },{ q: "Autoimmune disease example?", opts: ["Rheumatoid arthritis","Tuberculosis","Pneumonia","Appendicitis"], correct:0 },{ q: "Most common nosocomial infection?", opts: ["UTI","Pneumonia","Surgical site","Bloodstream"], correct:0 },{ q: "GFR measures?", opts: ["Kidney function","Liver function","Heart","Lung"], correct:0 },{ q: "Anaphylaxis treatment?", opts: ["Epinephrine","Antihistamine","Corticosteroid","Albuterol"], correct:0 },{ q: "Medical name for whiplash?", opts: ["Cervical acceleration-deceleration injury","Spinal contusion","Neck strain","Vertebral fracture"], correct:0 },{ q: "Peptic ulcer bacterium?", opts: ["H. pylori","E. coli","Salmonella","C. diff"], correct:0 }]

    let askedTracker = {};
    function getUniqueQuestion(domain, difficulty) {
        const bank = curatedBank[domain]?.[difficulty];
        if (!bank) return null;
        const key = `${domain}_${difficulty}`;
        if (!askedTracker[key]) askedTracker[key] = [];
        if (askedTracker[key].length >= bank.length) askedTracker[key] = [];
        let available = bank.filter((_, idx) => !askedTracker[key].includes(idx));
        if (available.length === 0) { askedTracker[key] = []; available = bank; }
        const randomIndex = bank.indexOf(available[Math.floor(Math.random() * available.length)]);
        askedTracker[key].push(randomIndex);
        return { ...bank[randomIndex] };
    }

    let currentTokens = 100;
    let currentMode = "single";

    let currentDifficulty = "easy";

    let connections = [];
    let isHost = false;
    let gameStarted = false;
    let questionPool = [];

    let opponentScore = 0;

    function enableOptions(enable) { document.querySelectorAll(".option").forEach(opt => opt.style.pointerEvents = enable ? "auto" : "none"); }

        const q = getUniqueQuestion(currentDomain, currentDifficulty);

        questionDiv.innerText = currentQuestion.q;

        currentQuestion.opts.forEach((opt, idx) => {
            const optDiv = document.createElement("div");
            optDiv.classList.add("option");
            optDiv.innerText = opt;
            optDiv.onclick = () => answerQuestion(idx);
            optionsDiv.appendChild(optDiv);
        });
        clearOptionStyles();
        enableOptions(true);
        statusSpan.innerHTML = "🤔 Choose your answer...";
        answerLock = false;
        nextBtn.classList.add("disabled");
        resetDisabledIndices();
    }

    function answerQuestion(selectedIdx) {
        if (answerLock || !currentQuestion) return;
        answerLock = true;
        const isCorrect = (selectedIdx === currentQuestion.correct);
        const allOptions = document.querySelectorAll(".option");
        if (allOptions[currentQuestion.correct]) allOptions[currentQuestion.correct].classList.add("correct-feedback");
        if (!isCorrect) {
            if (allOptions[selectedIdx]) allOptions[selectedIdx].classList.add("wrong-feedback");
            statusSpan.innerHTML = `❌ WRONG! Correct highlighted green. Score: ${score}`;
        } else {
            if (allOptions[selectedIdx]) allOptions[selectedIdx].classList.add("correct-feedback");
            currentTokens += 10;
            score++;
            statusSpan.innerHTML = `✅ CORRECT! +10 tokens 🪙 | Score: ${score}`;
        }
        updateTokenUI();
        enableOptions(false);
        nextBtn.classList.remove("disabled");
    }

    function goToNextQuestion() {
        if (!answerLock) return;
        answerLock = false;
        loadNewQuestion();
    }

    function useHint() {
        if (answerLock || !currentQuestion) return;
        if (currentTokens < 20) { statusSpan.innerText = "🚫 Need 20 tokens for hint!"; return; }
        let availableWrong = [];
        for (let i = 0; i < currentQuestion.opts.length; i++) {
            if (i !== currentQuestion.correct && !disabledIndices.includes(i)) availableWrong.push(i);
        }
        if (availableWrong.length === 0) { statusSpan.innerText = "💡 All wrong options already removed! Choose correct."; return; }
        currentTokens -= 20;
        updateTokenUI();
        const toDisable = availableWrong[Math.floor(Math.random() * availableWrong.length)];
        disabledIndices.push(toDisable);
        const optDivs = document.querySelectorAll(".option");
        if (optDivs[toDisable]) {
            optDivs[toDisable].style.opacity = "0.4";
            optDivs[toDisable].style.pointerEvents = "none";
            statusSpan.innerText = `💡 Hint used! Removed one wrong option (-20 tokens).`;
        }
        const remainingWrong = availableWrong.filter(i => !disabledIndices.includes(i)).length;
        if (remainingWrong === 0) statusSpan.innerText = "✨ All wrong options removed! Select correct answer.";
    }

    function revealAnswer() {
        if (answerLock || !currentQuestion) return;
        if (currentTokens < 30) { statusSpan.innerText = "🚫 Need 30 tokens to reveal!"; return; }
        currentTokens -= 30;
        updateTokenUI();
        const correctIdx = currentQuestion.correct;
        statusSpan.innerText = `🔍 Answer: ${currentQuestion.opts[correctIdx]} (-30 tokens)`;
        const optDivs = document.querySelectorAll(".option");
        if (optDivs[correctIdx]) optDivs[correctIdx].classList.add("correct-feedback");
    }

    function resetSingleGame() {
        score = 0;
        answerLock = false;
        loadNewQuestion();
        nextBtn.classList.add("disabled");
    }

    // ---------- MULTIPLAYER (FIXED: using reliable server) ----------
    function generateRoomCode(roomName, password) {
        let raw = roomName + password;
        let code = btoa(raw).replace(/[^a-zA-Z0-9]/g, '').substring(0, 20);
        return code;
    }

    function handlePeerData(data) {

    // GAME STARTED
    if (data.type === "game_start") {

        questionPool = data.pool;

        gameStarted = true;

        currentQuestionIndex = 0;

        score = 0;

        opponentScore = 0;

        statusSpan.innerText = "🎮 Quiz Started!";

        // FIRST QUESTION
        currentQuestion = questionPool[currentQuestionIndex];

        renderMultiplayerQuestion();

        answerLock = false;

        enableOptions(true);

        clearOptionStyles();

        startTimer(10);
    }

    // NEW QUESTION RECEIVED
    else if (data.type === "new_question") {

        currentQuestion = data.question;

        renderMultiplayerQuestion();

        answerLock = false;

        enableOptions(true);

        clearOptionStyles();

        startTimer(10);

        statusSpan.innerText = "⚡ New Question!";
    }

    // SOMEONE ANSWERED CORRECTLY
    else if (data.type === "answer_result") {

        if (answerLock) return;

        answerLock = true;

        clearInterval(timerInterval);

        const allOps = document.querySelectorAll(".option");

        if (allOps[currentQuestion.correct]) {
            allOps[currentQuestion.correct]
                .classList.add("correct-feedback");
        }

        if (data.playerId === peer.id) {

            score++;

            statusSpan.innerText =
                "✅ You answered first!";

        } else {

            opponentScore++;

            statusSpan.innerText =
                "❌ Opponent answered first!";
        }

        opponentScoreDiv.innerText =
            `Opponent Score: ${opponentScore}`;

        enableOptions(false);

        setTimeout(() => {

            if (isHost) {

                nextMultiplayerQuestion();
            }

        }, 2000);
    }

    // TIMEOUT
    else if (data.type === "timeout_next") {

        if (answerLock) return;

        answerLock = true;

        statusSpan.innerText = "⏰ Time up!";

        enableOptions(false);

        setTimeout(() => {

            if (isHost) {

                nextMultiplayerQuestion();
            }

        }, 1500);
    }

    // GAME END
    else if (data.type === "game_end") {

        gameStarted = false;

        clearInterval(timerInterval);

        questionDiv.innerText = "🏁 GAME OVER";

        optionsDiv.innerHTML = "";

        statusSpan.innerText =
            `Final Score: ${score}`;

        opponentScoreDiv.innerText =
            `Opponent Score: ${opponentScore}`;
    }
}

    function renderMultiplayerQuestion() {
        if (!currentQuestion) return;
        questionDiv.innerText = currentQuestion.q;
        optionsDiv.innerHTML = "";
        currentQuestion.opts.forEach((opt, idx) => {
            const optDiv = document.createElement("div");
            optDiv.classList.add("option");
            optDiv.innerText = opt;
            optDiv.onclick = () => submitMultiplayerAnswer(idx);
            optionsDiv.appendChild(optDiv);
        });
        clearOptionStyles();
    }

    function submitMultiplayerAnswer(selectedIdx) {
        if (!gameStarted || answerLock) return;
        const isCorrect = (selectedIdx === currentQuestion.correct);
        if (isCorrect) {
            if (!isHost) {
                connections.forEach(conn => conn.send({ type: "answer_result", correct: true, playerId: peer.id }));
            } else {
                if (!answerLock) {
                    answerLock = true;
                    clearInterval(timerInterval);
                    score++;
                    opponentScoreDiv.innerText = `Opponent Score: ${opponentScore}`;
                    statusSpan.innerText = "✅ You answered first correctly!";
                    const allOps = document.querySelectorAll(".option");
                    if (allOps[currentQuestion.correct]) allOps[currentQuestion.correct].classList.add("correct-feedback");
                    enableOptions(false);
                    broadcast({ type: "answer_result", correct: true, playerId: peer ? peer.id : "host" });
                    setTimeout(() => nextMultiplayerQuestion(), 2000);
                }
            }
        } else {
            statusSpan.innerText = "❌ Wrong! You cannot answer again this question.";
            enableOptions(false);
        }
    }

    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = seconds;
        timerBar.style.width = "100%";
        timerInterval = setInterval(() => {
            timeLeft--;
            timerBar.style.width = `${(timeLeft / seconds) * 100}%`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (!answerLock && gameStarted) {
                    statusSpan.innerText = "⏰ Time's up! No one answered.";
                    if (isHost) {
                        broadcast({ type: "timeout_next" });
                        nextMultiplayerQuestion();
                    }
                }
            }
        }, 1000);
    }

    function loadMultiplayerQuestion() {

    if (currentQuestionIndex >= questionPool.length) {

        broadcast({ type: "game_end" });

        gameStarted = false;

        statusSpan.innerText =
            `🏁 Game finished! Your score: ${score}`;

        return;
    }

    currentQuestion = questionPool[currentQuestionIndex];

    renderMultiplayerQuestion();

    answerLock = false;

    enableOptions(true);

    clearOptionStyles();

    startTimer(10);

    // SEND QUESTION TO CLIENTS
    if (isHost) {

        broadcast({
            type: "new_question",
            question: currentQuestion
        });
    }
}

    function nextMultiplayerQuestion() {
        if (!gameStarted) return;
        currentQuestionIndex++;
        loadMultiplayerQuestion();
    }

    function broadcast(msg) { connections.forEach(conn => conn.send(msg)); }
    function updatePlayersList() { playersListDiv.innerText = `Players connected: ${connections.length + 1}`; }

    // FIXED: Use reliable PeerJS server
    function createRoom() {
        const roomName = document.getElementById("roomName").value.trim();
        const password = document.getElementById("roomPassword").value;
        const domain = document.getElementById("multiDomain").value;
        const difficulty = document.getElementById("multiDifficulty").value;
        if (!roomName) { mpStatus.innerText = "Enter room name"; return; }
        const roomCode = generateRoomCode(roomName, password);
        isHost = true;
        let pool = [];
        for (let i = 0; i < 10; i++) {
            let q = getUniqueQuestion(domain, difficulty);
            if (q) pool.push(q);
        }
        questionPool = pool;
        if (peer) peer.destroy();
        // Use custom server that works
        peer = new Peer(roomCode, { host: '0.peerjs.com', port: 443, secure: true });
        peer.on('open', () => {
            mpStatus.innerText = `Room "${roomName}" created. Share name & password.`;
            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('data', data => handlePeerData(data));
                updatePlayersList();
                if (connections.length >= 1) startGameBtn.style.display = "block";
            });
        });
        peer.on('error', err => { mpStatus.innerText = `Error: ${err}`; console.error(err); });
        startGameBtn.onclick = () => {

    if (connections.length === 0) {

        statusSpan.innerText =
            "Need at least one more player!";

        return;
    }

    gameStarted = true;

    currentQuestionIndex = 0;

    score = 0;

    opponentScore = 0;

    // SEND GAME START FIRST
    broadcast({
        type: "game_start",
        pool: questionPool
    });

    // SMALL DELAY TO ALLOW CLIENTS TO PREPARE
    setTimeout(() => {

        loadMultiplayerQuestion();

    }, 500);

    startGameBtn.style.display = "none";
};
    }

    function joinRoom() {
        const roomName = document.getElementById("roomName").value.trim();
        const password = document.getElementById("roomPassword").value;
        const roomCode = generateRoomCode(roomName, password);
        isHost = false;
        if (peer) peer.destroy();
        peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
        peer.on('open', () => {
            const conn = peer.connect(roomCode);
            conn.on('open', () => {
                connections.push(conn);
                conn.on('data', data => handlePeerData(data));
                mpStatus.innerText = `Joined room ${roomName}. Waiting for host...`;
                updatePlayersList();
            });
            conn.on('error', err => { mpStatus.innerText = `Connection error: ${err}`; });
        });
        peer.on('error', err => { mpStatus.innerText = `Peer error: ${err}`; });
    }

    function leaveRoom() {

    if (timerInterval) {

        clearInterval(timerInterval);
    }

    if (peer) {

        peer.destroy();
    }

    connections = [];

    gameStarted = false;

    mpStatus.innerText = "Disconnected.";

    startGameBtn.style.display = "none";

    playersListDiv.innerText = "Players: --";

    opponentScoreDiv.innerText = "Opponent Score: --";

    score = 0;

    statusSpan.innerText =
        "Multiplayer mode. Create or join a room.";

    questionDiv.innerText =
        "Select multiplayer settings and create/join room";

    optionsDiv.innerHTML = "";
}

    // ---------- MODE SWITCHING (hide single-player buttons in multi) ----------
    function setMode(mode) {
        currentMode = mode;
        document.getElementById("switchToSingle").classList.toggle("active", mode === "single");
        document.getElementById("switchToMulti").classList.toggle("active", mode === "multi");
        if (mode === "single") {
            singleConfigDiv.style.display = "flex";
            multiPanel.style.display = "none";
            if (peer) leaveRoom();
            document.querySelectorAll(".single-only").forEach(el => el.style.display = "flex");
            resetSingleGame();
        } else {
            singleConfigDiv.style.display = "none";
            multiPanel.style.display = "block";
            leaveRoom();
            document.querySelectorAll(".single-only").forEach(el => el.style.display = "none");
            currentQuestion = null;
            gameStarted = false;
            statusSpan.innerText = "Multiplayer mode. Create or join a room.";
            questionDiv.innerText = "Select multiplayer settings and create/join room";
            optionsDiv.innerHTML = "";
        }
    }

    // Initial mode selection
    document.getElementById("chooseSingle").onclick = () => {
        document.getElementById("modeOverlay").style.display = "none";
        document.getElementById("mainArena").style.display = "block";
        setMode("single");
    };
    document.getElementById("chooseMulti").onclick = () => {
        document.getElementById("modeOverlay").style.display = "none";
        document.getElementById("mainArena").style.display = "block";
        setMode("multi");
    };
    document.getElementById("switchToSingle").onclick = () => setMode("single");
    document.getElementById("switchToMulti").onclick = () => setMode("multi");

    // Event bindings
    newGameBtn.onclick = () => { if (currentMode === "single") resetSingleGame(); };
    hintBtn.onclick = () => { if (currentMode === "single") useHint(); };
    revealBtn.onclick = () => { if (currentMode === "single") revealAnswer(); };
    nextBtn.onclick = () => { if (currentMode === "single") goToNextQuestion(); };
    domainSelect.onchange = () => { if (currentMode === "single") { currentDomain = domainSelect.value; resetSingleGame(); } };
    difficultySelect.onchange = () => { if (currentMode === "single") { currentDifficulty = difficultySelect.value; resetSingleGame(); } };
    createRoomBtn.onclick = createRoom;
    joinRoomBtn.onclick = joinRoom;
    leaveRoomBtn.onclick = leaveRoom;

    updateTokenUI();
</script>
</body>
</html>
